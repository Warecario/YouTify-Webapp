<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTify</title>
<link rel="icon" type="image/png" href="images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-shell">
  <div class="sidebar">
    <div>
      <h1 class="wordmark">YouTify</h1>
      <p class="tagline">Spotify's metadata.<br>YouTube's engine.</p>
    </div>

    <div class="auth-block">
      <button id="loginBtn" class="login-btn">Log in with Spotify</button>
      <div id="userLabel" class="user-label" style="display:none;"></div>
      <div class="swatch-label" id="playlistsLabel" style="display:none; margin-top:16px;">Your Playlists</div>
      <div id="playlists" class="playlists"></div>

      <div class="swatch-label" id="recentLabel" style="display:none; margin-top:16px;">Recently Played</div>
      <div id="recentList" class="playlists"></div>
    </div>

    <button class="settings-btn" id="settingsBtn"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Settings</button>

    <div class="footer-link">
      <a href="https://warecario.github.io/">Visit Warecario's website</a>
    </div>
  </div>

  <div class="main">
    <div class="main-scroll">
      <div class="search-wrap">
        <input id="query" type="text" placeholder="Search for songs or public playlists..." autocomplete="off">
        <button id="searchBtn">Search</button>
      </div>
      <p id="status"></p>
      <div id="results"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" id="closeSettings">✕</button>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">Accent color</div>
      <div class="swatches" id="swatches"></div>
    </div>

    <div class="modal-section" id="accountSection">
      <div class="modal-section-label">Account</div>
      <button class="modal-btn" id="logoutBtn" style="display:none;">Log out of Spotify</button>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">Keyboard Shortcuts</div>
      <div class="shortcut-row"><span>Play / pause</span><kbd>Space</kbd></div>
      <div class="shortcut-row"><span>Next track</span><kbd>→</kbd></div>
      <div class="shortcut-row"><span>Previous track</span><kbd>←</kbd></div>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">Data</div>
      <button class="modal-btn danger" id="clearDataBtn">Clear saved data (color, login, last track)</button>
    </div>
  </div>
</div>

<div id="player-bar">

  <div class="now-block">
    <div class="disc" id="disc">
      <img id="nowArt" src="" alt="">
    </div>
    <div class="now-meta">
      <div class="now-title" id="nowTitle"></div>
      <div class="now-artist" id="nowArtist"></div>
    </div>
  </div>

  <div class="transport">
    <div class="transport-buttons">
      <button id="shuffleBtn" title="Shuffle"></button>
      <button id="prevBtn" title="Previous"></button>
      <button id="playPause"></button>
      <button id="nextBtn" title="Next"></button>
      <button id="repeatBtn" title="Repeat"></button>
    </div>
    <div class="progress-row">
      <div class="time" id="timeCur">0:00</div>
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time time-right" id="timeDur">0:00</div>
    </div>
  </div>

  <div class="volume-block">
    <span id="volumeIcon"></span>
    <input type="range" id="volumeSlider" min="0" max="100" value="80">
  </div>

  <div class="source-block">
    Metadata via <a id="spotifyLink" href="#" target="_blank">Spotify</a><br>Playback via YouTube
  </div>

  <button id="miniToggleBtn" class="mini-toggle" title="Mini player">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="13" y="13" width="7" height="7" rx="1"/></svg>
  </button>
</div>

<div id="yt-hidden"><div id="ytPlayer"></div></div>

<script src="app.js" defer></script>

</body>
</html>
