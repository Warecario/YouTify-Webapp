<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTify</title>
<link rel="icon" type="image/png" href="images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-shell">
  <div class="sidebar">
    <div class="brand" id="brandHome" title="Home">
      <img id="siteLogo" class="site-logo" src="images/logo.svg" alt="" onerror="this.style.display='none';">
      <h1 class="wordmark">YouTify</h1>
      <p class="tagline">Spotify's metadata.<br>YouTube's engine.</p>
    </div>

    <div class="auth-block">
      <button id="loginBtn" class="login-btn">Log in with Spotify</button>
      <div class="swatch-label" id="playlistsLabel" style="display:none; margin-top:16px;">Your Playlists</div>
      <div id="playlists" class="playlists"></div>

      <div class="swatch-label" id="recentLabel" style="display:none; margin-top:16px;">Recently Played</div>
      <div id="recentList" class="playlists"></div>
    </div>

    <button class="settings-btn" id="settingsBtn"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Settings</button>

    <div class="footer-link">
      <a href="https://warecario.github.io/">Visit Warecario's website</a>
    </div>
  </div>

  <div class="main">
    <div class="main-scroll">
      <div class="search-wrap">
        <input id="query" type="text" placeholder="Search for songs..." autocomplete="off">
        <button id="searchBtn">Search</button>
      </div>
      <p id="status"></p>
      <div id="homeView"></div>
      <div id="resultsHeader" class="results-header" style="display:none;"></div>
      <div id="results" style="display:none;"></div>
      <div id="settingsView" style="display:none;">
        <h2 class="settings-page-title">Settings</h2>

        <div class="settings-card">
          <div class="settings-card-label">Accent color</div>
          <div class="swatches" id="swatches"></div>
        </div>

        <div class="settings-card" id="accountSection">
          <div class="settings-card-label">Account</div>
          <div id="userLabel" class="user-label" style="display:none;"></div>
          <button id="logoutBtn" class="settings-btn-full" style="display:none;">Log out of Spotify</button>
        </div>

        <div class="settings-card">
          <div class="settings-card-label">Keyboard Shortcuts</div>
          <div class="shortcut-row"><span>Play / pause</span><kbd>Space</kbd></div>
          <div class="shortcut-row"><span>Next track</span><kbd>→</kbd></div>
          <div class="shortcut-row"><span>Previous track</span><kbd>←</kbd></div>
        </div>

        <div class="settings-card">
          <div class="settings-card-label">Data</div>
          <button class="settings-btn-full danger" id="clearDataBtn">Clear saved data (color, login, last track)</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="player-bar">

  <div class="now-block">
    <div class="disc" id="disc">
      <img id="nowArt" src="" alt="">
    </div>
    <div class="now-meta">
      <div class="now-title" id="nowTitle"></div>
      <div class="now-artist" id="nowArtist"></div>
    </div>
  </div>

  <div class="transport">
    <div class="transport-buttons">
      <button id="shuffleBtn" title="Shuffle"></button>
      <button id="prevBtn" title="Previous"></button>
      <button id="playPause"></button>
      <button id="nextBtn" title="Next"></button>
      <button id="repeatBtn" title="Repeat"></button>
    </div>
    <div class="progress-row">
      <div class="time" id="timeCur">0:00</div>
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time time-right" id="timeDur">0:00</div>
    </div>
  </div>

  <div class="volume-block">
    <span id="volumeIcon"></span>
    <input type="range" id="volumeSlider" min="0" max="100" value="80">
  </div>

  <div class="source-block">
    Metadata via <a id="spotifyLink" href="#" target="_blank">Spotify</a><br>Playback via YouTube
  </div>

  <button id="queueToggleBtn" class="mini-toggle" title="Queue">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h11M4 12h11M4 18h6"/><path d="M18 9v10M18 9l-3 3M18 9l3 3"/></svg>
  </button>

  <button id="miniToggleBtn" class="mini-toggle" title="Pop out mini player">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="13" y="13" width="7" height="7" rx="1"/></svg>
  </button>
</div>

<div id="queuePanel" class="queue-panel">
  <div class="queue-panel-header">
    <h3>Queue</h3>
    <button class="modal-close" id="closeQueue">✕</button>
  </div>
  <div class="queue-section-label">Now Playing</div>
  <div id="queueNowPlaying" class="queue-list"></div>
  <div class="queue-section-label">Next Up</div>
  <div id="queueUpNext" class="queue-list"></div>
</div>

<!-- Lives hidden in the main document; on "pop out" this whole node is
     physically MOVED (not cloned) into a floating always-on-top window
     via the Document Picture-in-Picture API, then moved back on close.
     Moving real DOM nodes keeps all their event listeners intact. -->
<div id="miniPlayerRoot" style="display:none;">
  <img id="mpArt" src="" alt="">
  <div class="mp-meta">
    <div id="mpTitle" class="mp-title"></div>
    <div id="mpArtist" class="mp-artist"></div>
  </div>
  <div class="mp-controls">
    <button id="mpShuffle" title="Shuffle"></button>
    <button id="mpPrev" title="Previous"></button>
    <button id="mpPlayPause" title="Play/Pause"></button>
    <button id="mpNext" title="Next"></button>
    <button id="mpRepeat" title="Repeat"></button>
  </div>
  <div class="mp-volume">
    <span id="mpVolumeIcon"></span>
    <input type="range" id="mpVolumeSlider" min="0" max="100" value="80">
  </div>
  <div class="mp-progress-track" id="mpProgressTrack">
    <div class="mp-progress-fill" id="mpProgressFill"></div>
  </div>
</div>

<div id="yt-hidden"><div id="ytPlayer"></div></div>

<script src="app.js" defer></script>

</body>
</html>
